<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de sous-titres</title>
<style>
  :root {
    --violet-clair: #D8CBF2;
    --violet-bouton: #B79CE8;
    --violet-bouton-survol: #A483DE;
    --texte: #2B2B2B;
    --texte-discret: #6B6B6B;
    --bordure: #E4DAF6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #FFFFFF;
    color: var(--texte);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }

  .conteneur {
    width: 100%;
    max-width: 560px;
  }

  header {
    background: var(--violet-clair);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 28px;
  }

  header h1 {
    margin: 0 0 6px 0;
    font-size: 1.4rem;
  }

  header p {
    margin: 0;
    color: var(--texte);
    opacity: 0.75;
    font-size: 0.92rem;
  }

  .carte {
    border: 1px solid var(--bordure);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 20px;
  }

  .onglets {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }

  .onglet {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--bordure);
    font-size: 0.9rem;
    color: var(--texte-discret);
  }

  .onglet.actif {
    background: var(--violet-clair);
    color: var(--texte);
    border-color: var(--violet-clair);
    font-weight: 600;
  }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 6px;
    margin-top: 16px;
  }

  input[type="text"], input[type="file"], select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--bordure);
    font-size: 0.95rem;
    color: var(--texte);
  }

  .aide {
    font-size: 0.78rem;
    color: var(--texte-discret);
    margin-top: 4px;
  }

  .case {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 18px;
  }

  .case input { width: auto; }
  .case label { margin: 0; font-weight: 400; font-size: 0.9rem; }

  button {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    background: var(--violet-bouton);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  button:hover { background: var(--violet-bouton-survol); }
  button:disabled { background: #D9D9D9; cursor: not-allowed; }

  #zone_statut { display: none; }

  .barre-progression {
    height: 8px;
    background: #F0EAFB;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 14px;
  }

  .barre-progression-remplissage {
    height: 100%;
    background: var(--violet-bouton);
    width: 0%;
    transition: width 0.4s ease;
  }

  #texte_statut {
    font-size: 0.9rem;
    margin-top: 10px;
    color: var(--texte-discret);
  }

  #dernier_segment {
    font-size: 0.82rem;
    font-style: italic;
    color: var(--texte-discret);
    margin-top: 4px;
  }

  .liens_telechargement {
    display: none;
    margin-top: 16px;
    gap: 10px;
  }

  .liens_telechargement a {
    display: inline-block;
    padding: 10px 16px;
    background: var(--violet-clair);
    color: var(--texte);
    border-radius: 8px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    margin-right: 10px;
  }

  #zone_erreur {
    display: none;
    background: #FBEAEA;
    color: #9B3B3B;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.88rem;
    margin-top: 14px;
  }
</style>
</head>
<body>
<div class="conteneur">

  <header>
    <h1>Générateur de sous-titres</h1>
    <p>Transforme une vidéo en anglais en sous-titres français.</p>
  </header>

  <form id="formulaire" class="carte">

    <div class="onglets">
      <div class="onglet actif" data-onglet="fichier">Fichier vidéo</div>
      <div class="onglet" data-onglet="lien">Lien YouTube</div>
    </div>

    <div id="section_fichier">
      <label for="fichier">Choisir une vidéo</label>
      <input type="file" id="fichier" name="fichier" accept="video/*">
    </div>

    <div id="section_lien" style="display:none;">
      <label for="lien">Lien de la vidéo</label>
      <input type="text" id="lien" name="lien" placeholder="https://www.youtube.com/watch?v=...">
    </div>

    <label for="modele">Modèle de transcription</label>
    <select id="modele" name="modele">
      <option value="tiny">Tiny — très rapide, précision limitée</option>
      <option value="base">Base — rapide, précision correcte</option>
      <option value="small" selected>Small — bon compromis (recommandé)</option>
      <option value="medium">Medium — précis, plus lent</option>
      <option value="large-v3">Large-v3 — le plus précis, le plus lent</option>
    </select>
    <div class="aide">Un modèle plus précis prend plus de temps à traiter, surtout sans carte graphique.</div>

    <div class="case">
      <input type="checkbox" id="graver" name="graver">
      <label for="graver">Graver les sous-titres directement dans la vidéo</label>
    </div>

    <button type="submit" id="bouton_lancer">Générer les sous-titres</button>
  </form>

  <div id="zone_statut" class="carte">
    <div id="texte_statut">En attente...</div>
    <div id="dernier_segment"></div>
    <div class="barre-progression">
      <div class="barre-progression-remplissage" id="barre_remplissage"></div>
    </div>
    <div class="liens_telechargement" id="liens_telechargement">
      <a id="lien_srt" href="#">Télécharger les sous-titres (.srt)</a>
      <a id="lien_video" href="#" style="display:none;">Télécharger la vidéo</a>
    </div>
    <div id="zone_erreur"></div>
  </div>

</div>

<script>
const onglets = document.querySelectorAll(".onglet");
const sectionFichier = document.getElementById("section_fichier");
const sectionLien = document.getElementById("section_lien");

onglets.forEach(onglet => {
  onglet.addEventListener("click", () => {
    onglets.forEach(o => o.classList.remove("actif"));
    onglet.classList.add("actif");
    if (onglet.dataset.onglet === "fichier") {
      sectionFichier.style.display = "block";
      sectionLien.style.display = "none";
    } else {
      sectionFichier.style.display = "none";
      sectionLien.style.display = "block";
    }
  });
});

const ETAPES = {
  "en_attente": { texte: "En attente...", pourcentage: 5 },
  "extraction": { texte: "Récupération de la vidéo et extraction de l'audio...", pourcentage: 15 },
  "transcription": { texte: "Transcription en anglais en cours...", pourcentage: 45 },
  "traduction": { texte: "Traduction en français...", pourcentage: 80 },
  "gravure": { texte: "Gravure des sous-titres dans la vidéo...", pourcentage: 90 },
  "termine": { texte: "Terminé !", pourcentage: 100 },
  "erreur": { texte: "Une erreur est survenue.", pourcentage: 0 },
};

const formulaire = document.getElementById("formulaire");
const boutonLancer = document.getElementById("bouton_lancer");
const zoneStatut = document.getElementById("zone_statut");
const texteStatut = document.getElementById("texte_statut");
const dernierSegment = document.getElementById("dernier_segment");
const barreRemplissage = document.getElementById("barre_remplissage");
const liensTelechargement = document.getElementById("liens_telechargement");
const lienSrt = document.getElementById("lien_srt");
const lienVideo = document.getElementById("lien_video");
const zoneErreur = document.getElementById("zone_erreur");

let intervalleSondage = null;

formulaire.addEventListener("submit", async (e) => {
  e.preventDefault();
  boutonLancer.disabled = true;
  zoneStatut.style.display = "block";
  liensTelechargement.style.display = "none";
  zoneErreur.style.display = "none";
  dernierSegment.textContent = "";

  const donnees = new FormData();
  donnees.append("modele", document.getElementById("modele").value);
  donnees.append("graver", document.getElementById("graver").checked);

  const fichierInput = document.getElementById("fichier");
  const lienInput = document.getElementById("lien");

  if (fichierInput.files.length > 0) {
    donnees.append("fichier", fichierInput.files[0]);
  } else if (lienInput.value.trim()) {
    donnees.append("lien", lienInput.value.trim());
  } else {
    alert("Choisis un fichier vidéo ou colle un lien.");
    boutonLancer.disabled = false;
    return;
  }

  const reponse = await fetch("/taches", { method: "POST", body: donnees });
  const resultat = await reponse.json();

  if (!reponse.ok) {
    afficherErreur(resultat.erreur || "Erreur lors de la création de la tâche.");
    return;
  }

  suivreTache(resultat.id_tache);
});

function suivreTache(idTache) {
  intervalleSondage = setInterval(async () => {
    const reponse = await fetch(`/taches/${idTache}`);
    const statut = await reponse.json();

    const etape = ETAPES[statut.statut] || { texte: statut.statut, pourcentage: 50 };
    texteStatut.textContent = etape.texte;
    barreRemplissage.style.width = etape.pourcentage + "%";

    if (statut.segments_transcrits) {
      dernierSegment.textContent = `Segment ${statut.segments_transcrits} : "${statut.dernier_segment}"`;
    }

    if (statut.statut === "termine") {
      clearInterval(intervalleSondage);
      boutonLancer.disabled = false;
      liensTelechargement.style.display = "block";
      lienSrt.href = `/taches/${idTache}/srt`;
      if (statut.video_gravee_disponible) {
        lienVideo.href = `/taches/${idTache}/video`;
        lienVideo.style.display = "inline-block";
        lienVideo.textContent = "Télécharger la vidéo avec sous-titres gravés";
      }
      if (statut.segments_non_traduits > 0) {
        texteStatut.textContent = `Terminé (${statut.segments_non_traduits} segment(s) non traduits, restés en anglais)`;
      }
    }

    if (statut.statut === "erreur") {
      clearInterval(intervalleSondage);
      boutonLancer.disabled = false;
      afficherErreur(statut.erreur);
    }
  }, 2000);
}

function afficherErreur(message) {
  zoneErreur.style.display = "block";
  zoneErreur.textContent = message;
  boutonLancer.disabled = false;
}
</script>
</body>
</html>
